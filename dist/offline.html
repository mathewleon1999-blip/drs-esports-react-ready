<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | DRS Esports</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0a0e14;
      color: #e0e6ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      margin-bottom: 15px;
      color: #00d4ff;
    }
    p {
      color: #8b9dc3;
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .retry-btn {
      padding: 15px 40px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
    }
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      text-align: left;
    }
    .tips h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #00d4ff;
    }
    .tips ul {
      list-style: none;
    }
    .tips li {
      color: #8b9dc3;
      font-size: 14px;
      margin-bottom: 8px;
      padding-left: 20px;
      position: relative;
    }
    .tips li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #00d4ff;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, your game continues! Check back once you're back online.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    <div class="tips">
      <h3>While you wait:</h3>
      <ul>
        <li>Review your tournament strategies</li>
        <li>Check your team schedule</li>
        <li>Plan your next match</li>
      </ul>
    </div>
  </div>
  <script>
    // Auto retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
